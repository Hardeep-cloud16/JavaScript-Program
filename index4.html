<!-- Write js program to get window height and width -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Window Dimension</h1>
    <p>Width : <span id="width"></span>px</p>
    <p>Height : <span id="height"></span>px</p>

    <script>
      function updateWindowDimension() {
        let width = window.innerWidth;
        let height = window.innerHeight;

        document.getElementById("width").textContent = width;
        document.getElementById("height").textContent = height;
      }

      updateWindowDimension();

      window.addEventListener("resize", updateWindowDimension);
    </script>
  </body>
</html>
