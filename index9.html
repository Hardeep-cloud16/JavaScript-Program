<!-- WAP To Add TWo Number Using DOM -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="text" id="num1" placeholder="Enter Number 1" />
    <input type="text" id="num2" placeholder="Enter Number 3" />

    <button id="addButton">Add Number</button>

    <p id="result">Result :</p>

    <script>
      let Button = document.getElementById("addButton");
      let input1 = document.getElementById("num1");
      let input2 = document.getElementById("num2");
      let result = document.getElementById("result");

      Button.onclick = () => {
        let number1 = parseInt(input1.value);
        let number2 = parseInt(input2.value);

        let sum = number1 + number2;

        result.textContent = `Result of ${number1} and ${number2} is : ${sum}`;
      };
    </script>
  </body>
</html>
